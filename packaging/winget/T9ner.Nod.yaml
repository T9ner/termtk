ShortDescription: Offline-first, decentralized terminal-based P2P messaging app.
Description: >-
  Nod is a cross-platform, decentralized, offline-first terminal messenger.
  It discovers local peers automatically via UDP broadcast and synchronizes message
  history via TCP. If offline, users can export and import JSON-based sync files (sneakernet).
