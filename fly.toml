app = 'termtalk-relay'
primary_region = 'lhr'

# CRITICAL: Keep exactly 1 machine. Relay state is in-memory — multiple
# machines split the user registry and connections, breaking routing.
# Remove this constraint after adding relay-side persistence (v0.4.0).
[deploy]
  min_machines_running = 1

[build]
  dockerfile = 'Dockerfile'

[[services]]
  protocol = 'tcp'
  internal_port = 55558

  [[services.ports]]
    port = 55558
    handlers = []

  [services.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 500

[checks]
  [checks.alive]
    type = 'tcp'
    port = 55558
    interval = '15s'
    timeout = '2s'
