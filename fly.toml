app = 'nod-relay'
primary_region = 'lhr'

# Keep exactly 1 machine. Multi-machine requires shared external state
# beyond the per-machine SQLite volume.
[deploy]
  min_machines_running = 1

[mounts]
  source = "nod_data"
  destination = "/data"


[build]
  dockerfile = 'Dockerfile'

[[services]]
  protocol = 'tcp'
  internal_port = 55558

  [[services.ports]]
    port = 55558
    handlers = []

  [services.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 500

[checks]
  [checks.alive]
    type = 'tcp'
    port = 55558
    interval = '15s'
    timeout = '2s'
